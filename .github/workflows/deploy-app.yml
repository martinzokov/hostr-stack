name: Deploy app

on:
  push:
    branches: [main]
    paths:
      - apps/nextjs-starter/**
      - .github/workflows/deploy-app.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: apps/nextjs-starter
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:latest
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_DOMAIN: ${{ secrets.DOKPLOY_DOMAIN }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_ENVIRONMENT_ID: ${{ secrets.DOKPLOY_ENVIRONMENT_ID }}
          DOKPLOY_COMPOSE_NAME: ${{ secrets.DOKPLOY_COMPOSE_NAME }}
        run: |
          COMPOSE_ID=$(curl -fs \
            "https://${DOKPLOY_DOMAIN}/api/trpc/project.all" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for p in d['result']['data']['json']:
            for env in p.get('environments', []):
              if env['environmentId'] == '${DOKPLOY_ENVIRONMENT_ID}':
                for c in env.get('compose', []):
                  if c['name'] == '${DOKPLOY_COMPOSE_NAME}':
                    print(c['composeId'])
                    raise SystemExit(0)
          sys.exit(1)
          ")
          curl -fsS \
            -X POST "https://${DOKPLOY_DOMAIN}/api/trpc/compose.deploy" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"json\":{\"composeId\":\"${COMPOSE_ID}\"}}"
          echo "Triggered redeploy for compose ${COMPOSE_ID}"
