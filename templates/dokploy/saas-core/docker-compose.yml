name: hostr-saas-core

services:
  app:
    image: ${APP_IMAGE:-hostr-nextjs-starter:latest}
    pull_policy: ${APP_PULL_POLICY:-never}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: https://${APP_DOMAIN}
      DATABASE_URL: postgresql://hostr:${POSTGRES_PASSWORD}@postgres:5432/app
      LOGTO_APP_ID: ${LOGTO_APP_ID}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET}
      LOGTO_ENDPOINT: https://${LOGTO_DOMAIN}
      LOGTO_BASE_URL: https://${APP_DOMAIN}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET}
      NEXT_PUBLIC_UMAMI_SRC: https://${UMAMI_DOMAIN}/script.js
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      USESEND_API_URL: https://${USESEND_DOMAIN}/api
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hostr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${HOSTR_STACK_ROOT:-.}/templates/dokploy/saas-core/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostr -d app"]
      interval: 10s
      timeout: 5s
      retries: 12

  logto:
    image: ghcr.io/logto-io/logto:latest
    restart: unless-stopped
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    environment:
      TRUST_PROXY_HEADER: "1"
      DB_URL: postgres://hostr:${POSTGRES_PASSWORD}@postgres:5432/logto
      ENDPOINT: https://${LOGTO_DOMAIN}
      ADMIN_ENDPOINT: https://${LOGTO_ADMIN_DOMAIN}
      DATABASE_STATEMENT_TIMEOUT: DISABLE_TIMEOUT
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logto_connectors:/etc/logto/packages/core/connectors

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hostr:${POSTGRES_PASSWORD}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  signoz:
    profiles: ["signoz"]
    image: signoz/signoz:v0.97.1
    restart: unless-stopped
    command: ["--config=/root/config/prometheus.yml"]
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      STORAGE: clickhouse
      DEPLOYMENT_TYPE: docker-standalone-amd
      SIGNOZ_JWT_SECRET: ${SIGNOZ_JWT_SECRET:-}
    volumes:
      - signoz_sqlite:/var/lib/signoz
      - ${HOSTR_STACK_ROOT:-.}/templates/dokploy/saas-core/signoz-prometheus.yml:/root/config/prometheus.yml:ro
    depends_on:
      clickhouse:
        condition: service_healthy

  clickhouse:
    profiles: ["signoz"]
    image: clickhouse/clickhouse-server:25.5.6
    restart: unless-stopped
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ${HOSTR_STACK_ROOT:-.}/templates/dokploy/saas-core/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    depends_on:
      zookeeper:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  zookeeper:
    profiles: ["signoz"]
    image: zookeeper:3.9
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_4LW_COMMANDS_WHITELIST: ruok
    volumes:
      - zookeeper_data:/data

  otel-collector:
    profiles: ["signoz"]
    image: signoz/signoz-otel-collector:v0.129.7
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ${HOSTR_STACK_ROOT:-.}/templates/dokploy/saas-core/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      signoz:
        condition: service_started
      schema-migrator-sync:
        condition: service_completed_successfully

  schema-migrator-sync:
    profiles: ["signoz"]
    image: signoz/signoz-schema-migrator:v0.129.7
    restart: on-failure
    command: ["sync", "--dsn=tcp://clickhouse:9000", "--up=", "--cluster-name=cluster"]
    depends_on:
      clickhouse:
        condition: service_healthy

  schema-migrator-async:
    profiles: ["signoz"]
    image: signoz/signoz-schema-migrator:v0.129.7
    restart: on-failure
    command: ["async", "--dsn=tcp://clickhouse:9000", "--up=", "--cluster-name=cluster"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema-migrator-sync:
        condition: service_completed_successfully

  usesend-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: usesend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: usesend
    volumes:
      - usesend_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usesend -d usesend"]
      interval: 10s
      timeout: 5s
      retries: 12

  usesend-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    volumes:
      - usesend_cache:/data

  usesend-storage:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: usesend
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - usesend_storage:/data
    entrypoint: sh
    command: -c 'mkdir -p /data/usesend && minio server /data --console-address ":9001" --address ":9002"'

  usesend:
    image: usesend/usesend:latest
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://usesend:${POSTGRES_PASSWORD}@usesend-db:5432/usesend
      NEXTAUTH_URL: https://${USESEND_DOMAIN}
      NEXTAUTH_SECRET: ${USESEND_NEXTAUTH_SECRET}
      GITHUB_ID: ${USESEND_GITHUB_ID:-replace-with-github-client-id}
      GITHUB_SECRET: ${USESEND_GITHUB_SECRET:-replace-with-github-client-secret}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-usesend-local}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-usesend-local}
      REDIS_URL: redis://usesend-redis:6379
      NEXT_PUBLIC_IS_CLOUD: "false"
      API_RATE_LIMIT: "1"
      DOCKER_OUTPUT: "1"
    depends_on:
      usesend-db:
        condition: service_healthy
      usesend-redis:
        condition: service_started

volumes:
  postgres_data:
    name: hostr-saas-postgres-data
  logto_connectors:
    name: hostr-saas-logto-connectors
  signoz_sqlite:
    name: hostr-saas-signoz-sqlite
  clickhouse_data:
    name: hostr-saas-clickhouse-data
  zookeeper_data:
    name: hostr-saas-zookeeper-data
  usesend_database:
    name: hostr-saas-usesend-database
  usesend_cache:
    name: hostr-saas-usesend-cache
  usesend_storage:
    name: hostr-saas-usesend-storage
