name: hostr-umami

networks:
  hostr:
    external: true
    name: hostr-network

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    networks: [hostr]
    environment:
      DATABASE_URL: postgresql://hostr:${POSTGRES_PASSWORD}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
