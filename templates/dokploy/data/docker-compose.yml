name: hostr-data

networks:
  hostr:
    name: hostr-network
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [hostr]
    environment:
      POSTGRES_USER: hostr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${HOSTR_STACK_ROOT:-.}/templates/dokploy/data/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostr -d app"]
      interval: 10s
      timeout: 5s
      retries: 12

  mongodb:
    image: mongo:7
    restart: unless-stopped
    profiles: ["mongodb"]
    networks: [hostr]
    environment:
      MONGO_INITDB_ROOT_USERNAME: hostr
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: app
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u hostr -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
    name: hostr-saas-postgres-data
  mongodb_data:
    name: hostr-saas-mongodb-data
