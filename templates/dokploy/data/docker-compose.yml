name: hostr-data

networks:
  hostr:
    external: true
    name: hostr-network

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [hostr]
    environment:
      POSTGRES_USER: hostr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${HOSTR_STACK_ROOT:-.}/templates/dokploy/saas-core/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostr -d app"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
    name: hostr-saas-postgres-data
