name: hostr-usesend

networks:
  hostr:
    external: true
    name: hostr-network

services:
  usesend-db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [hostr]
    environment:
      POSTGRES_USER: usesend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: usesend
    volumes:
      - usesend_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usesend -d usesend"]
      interval: 10s
      timeout: 5s
      retries: 12

  usesend-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [hostr]
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    volumes:
      - usesend_cache:/data

  usesend-storage:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [hostr]
    environment:
      MINIO_ROOT_USER: usesend
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - usesend_storage:/data
    entrypoint: sh
    command: -c 'mkdir -p /data/usesend && minio server /data --console-address ":9001" --address ":9002"'

  usesend:
    image: usesend/usesend:latest
    restart: unless-stopped
    networks: [hostr]
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://usesend:${POSTGRES_PASSWORD}@usesend-db:5432/usesend
      NEXTAUTH_URL: https://${USESEND_DOMAIN}
      NEXTAUTH_SECRET: ${USESEND_NEXTAUTH_SECRET}
      GITHUB_ID: ${USESEND_GITHUB_ID:-replace-with-github-client-id}
      GITHUB_SECRET: ${USESEND_GITHUB_SECRET:-replace-with-github-client-secret}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-usesend-local}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-usesend-local}
      REDIS_URL: redis://usesend-redis:6379
      NEXT_PUBLIC_IS_CLOUD: "false"
      API_RATE_LIMIT: "1"
      DOCKER_OUTPUT: "1"
    depends_on:
      usesend-db:
        condition: service_healthy
      usesend-redis:
        condition: service_started

volumes:
  usesend_db:
    name: hostr-saas-usesend-db
  usesend_cache:
    name: hostr-saas-usesend-cache
  usesend_storage:
    name: hostr-saas-usesend-storage
